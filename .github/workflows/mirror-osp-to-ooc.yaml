name: Mirror to OpenOS-Project-Ecosystem-OOC

# This workflow lives in the upstream repo (Interested-Deving-1896) so it
# survives force-push syncs to OpenOS-Project-OSP. When mirrored to OSP,
# it runs there and pushes OSP's content downstream to OOC.
#
# Sync chain:
#   Interested-Deving-1896  →(mirror.yaml)→  OpenOS-Project-OSP
#   OpenOS-Project-OSP  →(this file)→  OpenOS-Project-Ecosystem-OOC

on:
  push:
    branches: ["**"]
    tags: ["**"]
  schedule:
    # Runs 15 minutes after the upstream→OSP sync to allow OSP to settle
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    # Only run when this workflow is executing in the OSP repo.
    # In the upstream repo this job is a no-op so it doesn't create
    # a redundant second push to OOC from the wrong source.
    if: github.repository == 'OpenOS-Project-OSP/incus-windows-toolkit'
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to OpenOS-Project-Ecosystem-OOC
        run: |
          git remote add mirror \
            "https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/OpenOS-Project-Ecosystem-OOC/incus-windows-toolkit.git"

          # Mirror all branches
          git push mirror --all --force

          # Mirror all tags
          git push mirror --tags --force
